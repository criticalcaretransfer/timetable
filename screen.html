<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMCCTC – Screen Display</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #1F3864;
    font-family: 'Barlow', Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .screen {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ─────────────────────────────────── */
  .top-bar {
    background: rgba(0,0,0,0.25);
    padding: 14px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .top-bar .course-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .top-bar .clock {
    font-size: 28px;
    font-weight: 800;
    color: #F4B942;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }

  /* ── Main content ────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 36px 60px;
    gap: 0;
  }

  /* ── Director message ────────────────────────── */
  #director-msg {
    display: none;
    background: rgba(244, 185, 66, 0.15);
    border: 2px solid #F4B942;
    border-radius: 10px;
    padding: 14px 24px;
    margin-bottom: 28px;
    font-size: 22px;
    font-weight: 600;
    color: #F4B942;
    text-align: center;
  }

  /* ── NOW section ─────────────────────────────── */
  .now-label {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #F4B942;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pulse-dot {
    width: 14px; height: 14px;
    background: #F4B942;
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(244,185,66,0.7); }
    70%  { box-shadow: 0 0 0 14px rgba(244,185,66,0); }
    100% { box-shadow: 0 0 0 0 rgba(244,185,66,0); }
  }

  /* ── Main gap ───────────────────────────────── */
  .main { gap: 16px; }

  /* ── NOW card ────────────────────────────────── */
  .now-card {
    background: rgba(244, 185, 66, 0.12);
    border: 2px solid rgba(244, 185, 66, 0.5);
    border-left: 8px solid #F4B942;
    border-radius: 14px;
    padding: 28px 36px;
    margin-bottom: 20px;
  }

  #current-session {
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 900;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 12px;
  }

  #current-time {
    font-size: clamp(20px, 2.5vw, 32px);
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    margin-bottom: 0;
  }

  /* ── NEXT card ───────────────────────────────── */
  .next-card {
    background: rgba(46, 117, 182, 0.2);
    border: 2px solid rgba(46, 117, 182, 0.4);
    border-left: 8px solid #2E75B6;
    border-radius: 14px;
    padding: 24px 36px;
  }

  .next-label {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #2E75B6;
    margin-bottom: 10px;
  }

  #next-session {
    font-size: clamp(22px, 3vw, 40px);
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  #next-time {
    font-size: clamp(16px, 2vw, 26px);
    font-weight: 600;
    color: rgba(255,255,255,0.45);
  }

  /* ── Off-programme states ────────────────────── */
  .state-msg {
    text-align: center;
    font-size: clamp(28px, 4vw, 52px);
    font-weight: 800;
    color: rgba(255,255,255,0.5);
    line-height: 1.3;
  }
  .state-sub {
    text-align: center;
    font-size: clamp(16px, 2vw, 28px);
    color: rgba(255,255,255,0.3);
    margin-top: 14px;
    font-weight: 600;
  }

  /* ── Countdown bar ───────────────────────────── */
  #countdown-bar {
    background: rgba(0,0,0,0.3);
    padding: 10px 36px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #countdown-bar.visible { display: flex; }
  .countdown-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .countdown-track {
    flex: 1;
    max-width: 600px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  .countdown-fill {
    height: 100%;
    background: #F4B942;
    border-radius: 4px;
    transition: width 1s linear;
  }
  #countdown-time {
    font-size: 36px;
    font-weight: 800;
    color: #F4B942;
    font-variant-numeric: tabular-nums;
    min-width: 120px;
    text-align: right;
  }

  /* ── Bottom bar ──────────────────────────────── */
  .bottom-bar {
    background: rgba(0,0,0,0.2);
    padding: 10px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .bottom-bar span {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .bottom-bar .gold { color: rgba(244,185,66,0.5); }
</style>
</head>
<body>

<div class="screen">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="course-name">West Midlands Critical Care Transfer Course &nbsp;|&nbsp; 12 June 2026</div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <!-- Main content -->
  <div class="main" id="main-content">
    <div class="state-msg">Loading…</div>
  </div>

  <!-- Countdown bar -->
  <div id="countdown-bar">
    <span class="countdown-label">Time remaining</span>
    <div class="countdown-track"><div class="countdown-fill" id="countdown-fill" style="width:100%"></div></div>
    <span id="countdown-time">--:--</span>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <span>Education Centre, Level 5 &nbsp;|&nbsp; Midland Metropolitan University Hospital</span>
    <span class="gold">ICS 5th Edition 2026</span>
  </div>

</div>

<script>
  // ── Firebase config ───────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyDPqISch9KdSDNnzkse4V5hep9aelhEvEA",
    authDomain:        "wmcctc---timetable.firebaseapp.com",
    databaseURL:       "https://wmcctc---timetable-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "wmcctc---timetable",
    storageBucket:     "wmcctc---timetable.firebasestorage.app",
    messagingSenderId: "411927987532",
    appId:             "1:411927987532:web:39a64b513263df47d53be9"
  };

  firebase.initializeApp(firebaseConfig);
  const db  = firebase.database();
  const ref = db.ref('programme');

  const COURSE_DATE = '2026-06-12';
  let activeOffset  = 0;
  let directorMsg   = '';

  // ── Session data ──────────────────────────────
  const sessions = [
    { start: '08:00', end: '08:15', title: 'Registration' },
    { start: '08:15', end: '08:20', title: 'Welcome & Housekeeping' },
    { start: '08:20', end: '08:45', title: 'Introduction to Transfer' },
    { start: '08:45', end: '09:15', title: 'Initial Considerations for Transfer' },
    { start: '09:15', end: '09:55', title: 'Ventilation for Transfer' },
    { start: '09:55', end: '10:25', title: 'Safe Transfer of the Brain Injured Patient' },
    { start: '10:25', end: '10:50', title: 'ACCoTS – Adult Critical Care Transfer Service' },
    { start: '10:50', end: '11:05', title: 'Coffee Break' },
    { start: '11:05', end: '11:35', title: 'Small Group Rotations – Round 1' },
    { start: '11:35', end: '12:10', title: 'Small Group Rotations – Round 2' },
    { start: '12:10', end: '12:45', title: 'Small Group Rotations – Round 3' },
    { start: '12:45', end: '13:20', title: 'Small Group Rotations – Round 4' },
    { start: '13:30', end: '14:00', title: 'Lunch' },
    { start: '14:00', end: '14:30', title: 'Equipment for Transfer' },
    { start: '14:30', end: '15:15', title: 'Simulation Block 1' },
    { start: '15:15', end: '16:00', title: 'Simulation Block 2' },
    { start: '16:00', end: '16:15', title: 'Coffee Break' },
    { start: '16:15', end: '17:00', title: 'Simulation Block 3' },
    { start: '17:00', end: '17:45', title: 'Simulation Block 4' },
    { start: '17:45', end: '18:00', title: 'Candidate Evaluation & Close' },
  ];

  // ── Helpers ───────────────────────────────────
  function toMins(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h * 60 + m;
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function addMins(hhmm, delta) {
    const t = ((toMins(hhmm) + delta) % 1440 + 1440) % 1440;
    return pad(Math.floor(t / 60)) + ':' + pad(t % 60);
  }
  function fmtTime(hhmm) {
    // format as e.g. 09:15
    return hhmm;
  }

  // ── Firebase listener ─────────────────────────
  ref.on('value', snap => {
    const data = snap.val() || {};
    activeOffset = data.offset  || 0;
    directorMsg  = data.message || '';
    render();
  });

  // ── Main render ───────────────────────────────
  function render() {
    const now     = new Date();
    const today   = now.toISOString().slice(0, 10);
    const nowMins = now.getHours() * 60 + now.getMinutes();

    // Clock
    document.getElementById('clock').textContent =
      pad(now.getHours()) + ':' + pad(now.getMinutes());

    const main = document.getElementById('main-content');

    const cbar = document.getElementById('countdown-bar');

    if (today !== COURSE_DATE) {
      cbar.classList.remove('visible');
      const isPre = today < COURSE_DATE;
      main.innerHTML = `
        <div class="state-msg">${isPre ? 'Course Day' : 'Course Complete'}</div>
        <div class="state-sub">${isPre ? '12 June 2026' : 'Thank you to all faculty and delegates'}</div>`;
      return;
    }

    // Find current and next sessions with offset applied
    let currentIdx = -1;
    for (let i = 0; i < sessions.length; i++) {
      const s = toMins(sessions[i].start) + activeOffset;
      const e = toMins(sessions[i].end)   + activeOffset;
      if (nowMins >= s && nowMins < e) { currentIdx = i; break; }
    }

    // Before course starts
    if (nowMins < toMins(sessions[0].start) + activeOffset) {
      const minsLeft = toMins(sessions[0].start) + activeOffset - nowMins;
      main.innerHTML = `
        <div class="state-msg">Course starts at ${addMins(sessions[0].start, activeOffset)}</div>
        <div class="state-sub">${minsLeft} minute${minsLeft !== 1 ? 's' : ''} to go</div>`;
      return;
    }

    // After course ends
    if (nowMins >= toMins(sessions[sessions.length-1].end) + activeOffset) {
      main.innerHTML = `
        <div class="state-msg">Course Complete</div>
        <div class="state-sub">Thank you to all faculty and delegates</div>`;
      return;
    }

    // Between sessions (gap e.g. 13:20–13:30)
    if (currentIdx === -1) {
      // Find next
      let nextIdx = -1;
      for (let i = 0; i < sessions.length; i++) {
        if (toMins(sessions[i].start) + activeOffset > nowMins) { nextIdx = i; break; }
      }
      if (nextIdx !== -1) {
        const ns = sessions[nextIdx];
        main.innerHTML = buildHTML(null, null, ns.title, addMins(ns.start, activeOffset), addMins(ns.end, activeOffset));
      }
      return;
    }

    // Normal: current + next
    const cur  = sessions[currentIdx];
    const next = currentIdx + 1 < sessions.length ? sessions[currentIdx + 1] : null;
    main.innerHTML = buildHTML(
      cur.title,
      addMins(cur.end, activeOffset),
      next ? next.title : null,
      next ? addMins(next.start, activeOffset) : null,
      next ? addMins(next.end,   activeOffset) : null
    );

    // Countdown bar
    const sessionStartMins = toMins(cur.start) + activeOffset;
    const sessionEndMins   = toMins(cur.end)   + activeOffset;
    const totalDuration    = sessionEndMins - sessionStartMins;
    const remaining        = sessionEndMins - nowMins;
    const nowSecs          = now.getSeconds();
    const remainingSecs    = remaining * 60 - nowSecs;
    const pct              = Math.max(0, Math.min(100, (remainingSecs / (totalDuration * 60)) * 100));
    const remMins          = Math.floor(remainingSecs / 60);
    const remSecs          = remainingSecs % 60;

    cbar.classList.add('visible');
    document.getElementById('countdown-fill').style.width = pct + '%';
    document.getElementById('countdown-time').textContent =
      pad(remMins) + ':' + pad(Math.max(0, remSecs)) + ' remaining';
    document.querySelector('.countdown-label').textContent =
      cur.title + ' ends at ' + addMins(cur.end, activeOffset);
  }

  function buildHTML(curTitle, curEnd, nextTitle, nextStart, nextEnd) {
    const msgHtml = directorMsg
      ? `<div id="director-msg" style="display:block">&#9888; ${directorMsg}</div>` : '';

    let html = msgHtml;

    if (curTitle) {
      html += `
        <div class="now-card">
          <div class="now-label"><div class="pulse-dot"></div>Now</div>
          <div id="current-session">${curTitle}</div>
          <div id="current-time">Ends at ${curEnd}</div>
        </div>`;
    }

    if (nextTitle) {
      html += `
        <div class="next-card">
          <div class="next-label">Up next</div>
          <div id="next-session">${nextTitle}</div>
          <div id="next-time">Starts ${nextStart} &nbsp;&mdash;&nbsp; ends ${nextEnd}</div>
        </div>`;
    } else if (curTitle) {
      html += `<div class="next-card"><div class="next-label" style="color:rgba(255,255,255,0.3);">Final session of the day</div></div>`;
    }

    return html;
  }

  render();
  setInterval(render, 1000); // 1s tick for smooth countdown
</script>

</body>
</html>
